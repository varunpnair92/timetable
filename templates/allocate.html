<!DOCTYPE html>
<html>
<head>
    <title>Allocate Staff</title>
</head>
<body>
    <div style="position: absolute; top: 20px; right: 30px;">
        <a href="{% url 'dashboard' %}" style="text-decoration: none; padding: 8px 12px; background-color: #007BFF; color: white; border-radius: 5px;">Dashboard</a>
    </div>
    <h1>Allocate Staff to Subject</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" name="action" value="allot">Allot</button>
        <button type="submit" name="action" value="delete">Delete</button>
       
        
    </form>
    {% load static %}
    <script src="{% static 'admin/js/jquery-3.6.0.min.js' %}"></script>
    <script>
        $(document).ready(function () {
            alert("hai");
            $('#id_staff').change(function () {
                const staffId = $(this).val();
                $.ajax({
                    url: "{% url 'get_allotments' %}",
                    data: { staff_id: staffId },
                    success: function (data) {
                        const deleteSelect = $('#id_delete_entry');
                        deleteSelect.empty();
                        deleteSelect.append('<option value="">---------</option>');
                        data.forEach(item => {
                            deleteSelect.append(`<option value="${item.id}">${item.label}</option>`);
                        });
                    }
                });
            });
        });
    </script>
    

</body>
</html>
