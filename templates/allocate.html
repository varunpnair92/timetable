<!DOCTYPE html>
<html>
<head>
    <title>Allocate Staff</title>
</head>
<body>
    <div style="position: absolute; top: 20px; right: 30px;">
        <a href="{% url 'dashboard' %}" style="text-decoration: none; padding: 8px 12px; background-color: #007BFF; color: white; border-radius: 5px;">Dashboard</a>
    </div>
    <h1>Allocate Staff to Subject</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" name="action" value="allot">Allot</button>
        <button type="submit" name="action" value="delete">Delete</button>
        <p><a href="{% url 'dashboard' %}">Change Password</a></p>
        
    </form>
</body>
</html>
