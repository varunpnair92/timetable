<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f4f4f4;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            max-width: 500px;
            margin: auto;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
        }
        ul {
            list-style: none;
            padding: 0;
        }
        ul li a {
            display: block;
            padding: 10px;
            background: #007BFF;
            color: white;
            text-decoration: none;
            margin-bottom: 10px;
            border-radius: 5px;
        }
        ul li a:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>Welcome, {{ user.username }} 👋</h2>
    <ul>
        <li><a href="{% url 'timetable' %}">View Timetable</a></li>
         <li><a href="{% url 'timetable_auto' %}">View Timetable</a></li>
        <li><a href="{% url 'allocate' %}">Allocate Staff</a></li>
        <li><a href="{% url 'alloctted_staff' %}">Allotted Staff</a></li>
        <li><a href="{% url 'allot_subject_entry' %}">Allot Subject</a></li>
        <li><a href="{% url 'Lab Download' %}">Download Timetable Excel</a></li>
         <li><a href="{% url 'Lab Download Combined' %}">Download Timetable Excel Full</a></li>
        <li><a href="{% url 'Lab Download 2' %}">Download Lab Allotments CSV</a></li>
        <li><a href="{% url 'delete_subject' %}">Delete Subject Entry</a></li>
        <li><a href="{% url 'password_change' %}">Change Password</a></li>
        <li><a href="{% url 'logout' %}">Logout</a></li>
    </ul>
</div>
</body>
</html>
